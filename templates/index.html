<!doctype html>
<html>
  <head>
    <title>Forest Fire Predictor</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="container">
      <h1>Forest Fire FWI Predictor</h1>
      <p class="subtitle">Algerian Forest Fires Dataset</p>

      <form action="/predict" method="POST">
        <div class="form-group">
          <label>Temperature (°C)</label>
          <input
            type="number"
            step="0.1"
            name="Temperature"
            placeholder="e.g. 32"
            required
          />
        </div>

        <div class="form-group">
          <label>Relative Humidity (%)</label>
          <input
            type="number"
            step="0.1"
            name="RH"
            placeholder="e.g. 55"
            required
          />
        </div>

        <div class="form-group">
          <label>Wind Speed (km/h)</label>
          <input
            type="number"
            step="0.1"
            name="Ws"
            placeholder="e.g. 15"
            required
          />
        </div>

        <div class="form-group">
          <label>Rain (mm)</label>
          <input
            type="number"
            step="0.1"
            name="Rain"
            placeholder="e.g. 0"
            required
          />
        </div>

        <div class="form-group">
          <label>FFMC Index</label>
          <input
            type="number"
            step="0.1"
            name="FFMC"
            placeholder="e.g. 85.0"
            required
          />
        </div>

        <div class="form-group">
          <label>DMC Index</label>
          <input
            type="number"
            step="0.1"
            name="DMC"
            placeholder="e.g. 20.0"
            required
          />
        </div>

        <div class="form-group">
          <label>ISI Index</label>
          <input
            type="number"
            step="0.1"
            name="ISI"
            placeholder="e.g. 5.0"
            required
          />
        </div>

        <div class="form-group">
          <label>Classes (0 = Not Fire, 1 = Fire)</label>
          <input
            type="number"
            min="0"
            max="1"
            name="Classes"
            placeholder="0 or 1"
            required
          />
        </div>

        <div class="form-group">
          <label>Region (0 = Bejaia, 1 = Sidi-Bel Abbes)</label>
          <input
            type="number"
            min="0"
            max="1"
            name="Region"
            placeholder="0 or 1"
            required
          />
        </div>

        <button type="submit">Predict FWI</button>
      </form>
    </div>
  </body>
</html>
